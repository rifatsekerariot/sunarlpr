name: Build & Test LPR System

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true

      - name: Build Frontend Service
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true

      - name: Build AI Worker Service
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          load: true
