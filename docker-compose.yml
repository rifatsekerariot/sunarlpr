version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lpr-postgres
    restart: always
    environment:
      POSTGRES_DB: lpr_db
      POSTGRES_USER: lpr_user
      POSTGRES_PASSWORD: lpr_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lpr_user -d lpr_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lpr-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lpr-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://lpr_user:lpr_password@postgres:5432/lpr_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkeyforlprproject2026
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - shared-media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: lpr-frontend
    restart: always
    environment:
      - BACKEND_API_URL=http://backend:8000
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - shared-media:/app/media
    depends_on:
      backend:
        condition: service_started

  worker:
    build: ./worker
    container_name: lpr-worker
    restart: always
    environment:
      - BACKEND_API_URL=http://backend:8000
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./worker:/app
      - shared-media:/app/media
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: lpr-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-media:/usr/share/nginx/html/media:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
  shared-media:
